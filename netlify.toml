# Configuração de deploy do site Müller Tech & Innovation na Netlify.
# O projeto fica na subpasta MullerTech/, por isso usamos `base`.

[build]
  base = "MullerTech"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Atalho amigável: /api/send-email -> /.netlify/functions/send-email
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
