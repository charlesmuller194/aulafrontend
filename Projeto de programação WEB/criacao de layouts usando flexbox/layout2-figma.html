<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout 2 – Figma</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      padding: 0 32px;
      background-color: #ffffff;
      border-bottom: 2px solid #ddd;
    }

    .header-logo {
      width: 80px;
      height: 40px;
      background-color: #ffe0d6;
      border: 2px solid #f24e1e;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #f24e1e;
      font-size: 13px;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-nav a {
      padding: 6px 14px;
      background-color: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-decoration: none;
      color: #333;
      font-size: 13px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-outline {
      padding: 8px 16px;
      background-color: transparent;
      border: 2px solid #333;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-black {
      padding: 8px 16px;
      background-color: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-text {
      padding: 8px 16px;
      background-color: #f5f5f5;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    /* ── HERO ────────────────────────────────────────────────── */
    .hero {
      display: flex;
      min-height: calc(100vh - 64px);
      background-color: #ffffff;
      overflow: hidden;
    }

    /* Coluna esquerda: texto + botões */
    .hero-left {
      flex: 0 0 55%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 72px;
      gap: 28px;
    }

    .hero-title {
      width: 100%;
      height: 100px;
      background-color: #fff3ee;
      border: 2px dashed #f24e1e;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #f24e1e;
    }

    .hero-body {
      width: 100%;
      height: 100px;
      background-color: #fafafa;
      border: 2px dashed #999;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #666;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
    }

    .hero-buttons .btn-black {
      padding: 12px 24px;
      font-size: 15px;
    }

    .hero-buttons .btn-outline {
      padding: 12px 24px;
      font-size: 15px;
    }

    /* Coluna direita: imagens decorativas empilhadas */
    .hero-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 24px;
      background-color: #fafafa;
      border-left: 2px solid #eee;
      overflow: hidden;
    }

    /* Separadores (pílulas coloridas) */
    .hero-right .pill {
      width: 60px;
      height: 18px;
      background-color: #ff2d92;
      border-radius: 20px;
    }

    /* Shapes decorativos */
    .shape-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background-color: #c8d8ff;
      border: 3px solid #5b80e8;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5b80e8;
      font-size: 12px;
    }

    .shape-diamond {
      width: 160px;
      height: 160px;
      background-color: #6b1f1f;
      border: 3px solid #8b3030;
      transform: rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shape-diamond span {
      transform: rotate(-45deg);
      color: #d4e88a;
      font-size: 11px;
    }

    .shape-blob {
      width: 160px;
      height: 100px;
      background-color: #5ae85a;
      border: 3px solid #33aa33;
      border-radius: 50% 50% 45% 45%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-logo">Logo</div>

    <nav class="header-nav">
      <a href="#">Produtos ▾</a>
      <a href="#">Soluções ▾</a>
      <a href="#">Comunidade ▾</a>
      <a href="#">Recursos ▾</a>
      <a href="#">Preços</a>
    </nav>

    <div class="header-actions">
      <button class="btn-text">Entrar</button>
      <button class="btn-outline">Fale com a equipe de vendas</button>
      <button class="btn-black">Comece sem custos</button>
    </div>
  </header>

  <!-- HERO -->
  <main>
    <section class="hero">

      <!-- Coluna esquerda: conteúdo textual -->
      <div class="hero-left">
        <div class="hero-title">[ Título principal – H1 Grande ]</div>
        <div class="hero-body">[ Parágrafo descritivo com detalhes do produto ]</div>
        <div class="hero-buttons">
          <button class="btn-black">Comece agora</button>
          <button class="btn-outline">Fale com a equipe de vendas</button>
        </div>
      </div>

      <!-- Coluna direita: elementos decorativos empilhados -->
      <div class="hero-right">
        <div class="shape-circle">[ Imagem circular ]</div>
        <div class="pill"></div>
        <div class="shape-diamond"><span>[ Shape ]</span></div>
        <div class="pill"></div>
        <div class="shape-blob">[ Shape ]</div>
      </div>

    </section>
  </main>

</body>
</html>
