<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout 3 – GitHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

    body {
      background-color: #0d1117;
      color: #ffffff;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      padding: 0 32px;
      background-color: #161b22;
      border-bottom: 2px solid #30363d;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .header-logo {
      width: 44px;
      height: 44px;
      background-color: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #161b22;
      font-weight: bold;
    }

    .header-nav {
      display: flex;
      gap: 4px;
    }

    .header-nav a {
      padding: 6px 14px;
      background-color: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      text-decoration: none;
      color: #cdd9e5;
      font-size: 13px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-box {
      width: 180px;
      height: 34px;
      background-color: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #8b949e;
    }

    .btn-ghost {
      padding: 6px 16px;
      background-color: transparent;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #cdd9e5;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-green {
      padding: 6px 16px;
      background-color: #238636;
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-size: 13px;
      cursor: pointer;
    }

    /* ── HERO ────────────────────────────────────────────────── */
    .hero {
      min-height: calc(100vh - 64px);
      background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      gap: 32px;
      text-align: center;
    }

    .hero-title {
      width: 780px;
      height: 130px;
      background-color: #1c2030;
      border: 2px dashed #4d5566;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #8b949e;
    }

    .hero-subtitle {
      width: 560px;
      height: 70px;
      background-color: #1c2030;
      border: 2px dashed #4d5566;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #8b949e;
    }

    /* Linha com input + dois botões */
    .hero-form {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .form-input {
      width: 280px;
      height: 48px;
      background-color: #21262d;
      border: 2px solid #30363d;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 14px;
      color: #8b949e;
    }

    .btn-form-green {
      width: 200px;
      height: 48px;
      background-color: #238636;
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-form-outline {
      width: 240px;
      height: 48px;
      background-color: transparent;
      border: 2px solid #8b949e;
      border-radius: 6px;
      color: #cdd9e5;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="header-logo">⊙</div>
      <nav class="header-nav">
        <a href="#">Plataforma ▾</a>
        <a href="#">Soluções ▾</a>
        <a href="#">Recursos ▾</a>
        <a href="#">Código aberto ▾</a>
        <a href="#">Enterprise ▾</a>
        <a href="#">Preços</a>
      </nav>
    </div>

    <div class="header-right">
      <div class="search-box">[ Campo de busca 🔍 ]</div>
      <button class="btn-ghost">Entrar</button>
      <button class="btn-green">Criar uma conta</button>
    </div>
  </header>

  <!-- HERO -->
  <main>
    <section class="hero">
      <div class="hero-title">[ Título principal em destaque – H1 Grande ]</div>
      <div class="hero-subtitle">[ Parágrafo descritivo centralizado ]</div>

      <!-- Linha: input + botão cadastro + botão copilot -->
      <div class="hero-form">
        <div class="form-input">[ Digite seu e-mail ]</div>
        <button class="btn-form-green">[ Cadastrar-se ]</button>
        <button class="btn-form-outline">[ Experimente grátis ]</button>
      </div>
    </section>
  </main>

</body>
</html>
